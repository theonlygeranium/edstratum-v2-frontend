name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  statuses: write

jobs:
  build-and-test:
    name: Build, lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Omit VITE_STRATUM_API_URL to build in mock mode — avoids any
          # accidental live backend calls or escalation emails during CI.
          NODE_VERSION: '20'

      - name: Verify dist output
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing" && exit 1)
          test -f dist/build-manifest.json || (echo "ERROR: dist/build-manifest.json missing" && exit 1)
          echo "✓ dist/index.html present"
          echo "✓ dist/build-manifest.json present"

      - name: Build Cloudflare Pages Functions
        run: npx wrangler pages functions build

      - name: Forbidden copy scan
        # Rejects any source file that contains a direct scheduling link or
        # a real personal name/email that could violate the discretion policy.
        run: |
          FORBIDDEN_PATTERNS=(
            "calendly\.com"
            "cal\.com"
            "jeffrey geronimo"
            "jg@writer\.com"
            "jgeronimo@"
          )
          FOUND=0
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            if grep -rli --include="*.ts" --include="*.tsx" --include="*.js" \
                --include="*.jsx" --include="*.html" -E "$pattern" src/ public/ 2>/dev/null; then
              echo "ERROR: forbidden pattern '$pattern' found in source"
              FOUND=1
            fi
          done
          if [ $FOUND -ne 0 ]; then exit 1; fi
          echo "✓ Forbidden copy scan passed"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Notify build status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'CI / build-and-test',
              description: state === 'success'
                ? 'Build and tests passed'
                : 'Build or tests failed - do not merge'
            })
